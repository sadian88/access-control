<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Guard | Control de Acceso</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #050508;
      --bg-secondary: #0a0a10;
      --bg-card: rgba(15, 15, 25, 0.95);
      --border: rgba(255, 255, 255, 0.12);
      --border-bright: rgba(255, 255, 255, 0.25);
      --cyan: #00e5ff;
      --cyan-dim: rgba(0, 229, 255, 0.15);
      --cyan-glow: rgba(0, 229, 255, 0.4);
      --green: #00ff88;
      --green-dim: rgba(0, 255, 136, 0.2);
      --yellow: #ffc800;
      --yellow-dim: rgba(255, 200, 0, 0.2);
      --red: #ff4455;
      --red-dim: rgba(255, 68, 85, 0.2);
      --blue: #4488ff;
      --blue-dim: rgba(68, 136, 255, 0.2);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-dim: rgba(255, 255, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-primary);
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle 600px at 50% 30%, rgba(0, 229, 255, 0.06) 0%, transparent 100%),
        radial-gradient(circle 400px at 80% 80%, rgba(68, 136, 255, 0.04) 0%, transparent 100%);
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #000;
    }

    .logo-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 2px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-bright);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.3s;
    }

    .status-dot.ok {
      background: var(--green);
      box-shadow: 0 0 12px var(--green), 0 0 24px var(--green-dim);
    }

    .status-dot.fail {
      background: var(--red);
      box-shadow: 0 0 12px var(--red);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Main content */
    .main-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    /* Camera panel */
    .camera-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      position: relative;
    }

    .camera-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 2px solid var(--border-bright);
      box-shadow: 
        0 0 0 1px var(--border),
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 0 100px rgba(0, 229, 255, 0.02);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #mesh-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }

    /* Scan overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scan-corners i {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 4px solid var(--cyan);
      filter: drop-shadow(0 0 8px var(--cyan-glow));
    }

    .scan-corners .tl { top: 20px; left: 20px; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
    .scan-corners .tr { top: 20px; right: 20px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
    .scan-corners .bl { bottom: 20px; left: 20px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
    .scan-corners .br { bottom: 20px; right: 20px; border-left: none; border-top: none; border-radius: 0 0 8px 0; }

    .countdown-badge {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 30px var(--cyan-dim), 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* Message bar */
    .message-bar {
      margin-top: 24px;
      width: 100%;
      max-width: 480px;
      padding: 18px 24px;
      border-radius: 16px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s ease;
    }

    body.state-entry .message-bar { 
      border-color: var(--green); 
      box-shadow: 0 0 40px var(--green-dim);
      background: rgba(0, 255, 136, 0.05);
    }
    body.state-exit .message-bar { 
      border-color: var(--blue); 
      box-shadow: 0 0 40px var(--blue-dim);
      background: rgba(68, 136, 255, 0.05);
    }
    body.state-unknown .message-bar { 
      border-color: var(--yellow); 
      box-shadow: 0 0 40px var(--yellow-dim);
      background: rgba(255, 200, 0, 0.05);
    }
    body.state-error .message-bar { 
      border-color: var(--red); 
      box-shadow: 0 0 40px var(--red-dim);
      background: rgba(255, 68, 85, 0.05);
    }

    .message-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cyan-dim);
      color: var(--cyan);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    body.state-entry .message-icon { background: var(--green-dim); color: var(--green); }
    body.state-exit .message-icon { background: var(--blue-dim); color: var(--blue); }
    body.state-unknown .message-icon { background: var(--yellow-dim); color: var(--yellow); }
    body.state-error .message-icon { background: var(--red-dim); color: var(--red); }

    .message-text {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .message-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* Side panel */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* Intel panel */
    .intel-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .intel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--red-dim);
      color: var(--red);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      border: 1px solid rgba(255, 68, 85, 0.3);
    }

    .live-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1s infinite;
    }

    .intel-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .intel-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
    }

    .intel-key {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .intel-value {
      font-size: 12px;
      color: var(--cyan);
      font-weight: 600;
      font-family: 'SF Mono', monospace;
    }

    .panel-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-ring {
      width: 60px;
      height: 60px;
      border: 4px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-text {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    @media (max-width: 900px) {
      .main-content {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }

      .camera-container {
        max-width: 360px;
      }

      .side-panel {
        flex-direction: row;
      }

      .panel-card {
        flex: 1;
      }
    }
  </style>
</head>
<body class="state-idle">
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div id="loading-text">Inicializando sistema...</div>
  </div>

  <main id="app">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">EG</div>
        <div>
          <div class="logo-title">Edge Guard</div>
          <div class="logo-subtitle">Control de Acceso</div>
        </div>
      </div>
      <div class="connection-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="connection-text">Conectando...</span>
      </div>
    </header>

    <div class="main-content">
      <section class="camera-panel">
        <div class="camera-container">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="mesh-canvas"></canvas>
          
          <div class="scan-overlay">
            <div class="countdown-badge" id="countdown">LISTO PARA LECTURA</div>
          </div>
          
          <div class="scan-corners" aria-hidden="true">
            <i class="tl"></i>
            <i class="tr"></i>
            <i class="bl"></i>
            <i class="br"></i>
          </div>
        </div>

        <div class="message-bar" id="message-bar">
          <div class="message-icon" id="message-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
          </div>
          <div>
            <div class="message-text" id="message">Presente su rostro frente a la cámara</div>
            <div class="message-sub" id="message-sub"></div>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-card intel-panel">
          <div class="intel-header">
            <span class="section-title">Análisis Biométrico</span>
            <span class="live-badge">LIVE</span>
          </div>
          
          <div class="intel-list">
            <div class="intel-item">
              <span class="intel-key">Estado</span>
              <span class="intel-value" id="intel-status">ESCANEO</span>
            </div>
            <div class="intel-item">
              <span class="intel-key">Rostro</span>
              <span class="intel-value" id="intel-face">NO DETECTADO</span>
            </div>
            <div class="intel-item">
              <span class="intel-key">Puntos</span>
              <span class="intel-value" id="intel-points">0</span>
            </div>
            <div class="intel-item">
              <span class="intel-key">Confianza</span>
              <span class="intel-value" id="intel-confidence">0%</span>
            </div>
            <div class="intel-item">
              <span class="intel-key">Tiempo</span>
              <span class="intel-value" id="intel-time">0 ms</span>
            </div>
            <div class="intel-item">
              <span class="intel-key">Evento</span>
              <span class="intel-value" id="intel-event">ESPERANDO</span>
            </div>
          </div>

          <div class="panel-footer">
            <span>MediaPipe FaceMesh</span>
            <span>Zona: Lobby A1</span>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <canvas id="canvas" hidden></canvas>

  <script>
    const BACKEND_URL = 'http://localhost:8000';
    const WS_URL = 'ws://localhost:8000/api/v1/ws/admin';
    const DETECT_INTERVAL = 120;
    const MESH_INTERVAL = 85;
    const MSG_DURATION = 5000;
    const JPEG_QUALITY = 0.72;
    const ANALYSIS_WIDTH = 480;
    const ANALYSIS_HEIGHT = 270;
    const CAPTURE_MAX_WIDTH = 720;

    const video = document.getElementById('video');
    const scanStage = document.querySelector('.camera-container');
    const meshCanvas = document.getElementById('mesh-canvas');
    const meshCtx = meshCanvas.getContext('2d');
    const canvas = document.getElementById('canvas');
    const captureCtx = canvas.getContext('2d');
    const detectCanvas = document.createElement('canvas');
    const detectCtx = detectCanvas.getContext('2d', { willReadFrequently: true });
    detectCanvas.width = ANALYSIS_WIDTH;
    detectCanvas.height = ANALYSIS_HEIGHT;

    const messageEl = document.getElementById('message');
    const messageSubEl = document.getElementById('message-sub');
    const countdownEl = document.getElementById('countdown');
    const dotEl = document.getElementById('status-dot');
    const connectionText = document.getElementById('connection-text');
    const overlay = document.getElementById('loading-overlay');
    const loadingTxt = document.getElementById('loading-text');
    const body = document.body;

    const intelStatus = document.getElementById('intel-status');
    const intelFace = document.getElementById('intel-face');
    const intelPoints = document.getElementById('intel-points');
    const intelConfidence = document.getElementById('intel-confidence');
    const intelTime = document.getElementById('intel-time');
    const intelEvent = document.getElementById('intel-event');

    const faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      selfieMode: false,
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.55,
      minTrackingConfidence: 0.55
    });

    let isBusy = false;
    let waitingForApproval = false;
    let msgTimer = null;
    let lastMeshMs = 0;
    let lastMeshAt = 0;
    let meshRunning = false;
    let latestLandmarks = null;
    let ws = null;
    let wsReconnectTimer = null;

    function resizeMeshCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const stageW = scanStage.clientWidth || 480;
      const stageH = scanStage.clientHeight || 480;
      meshCanvas.width = Math.round(stageW * dpr);
      meshCanvas.height = Math.round(stageH * dpr);
      meshCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 480 },
          height: { ideal: 480 },
          frameRate: { ideal: 20, max: 24 },
          facingMode: 'user'
        }
      });

      video.srcObject = stream;
      await new Promise((resolve) => video.addEventListener('loadedmetadata', resolve, { once: true }));
      resizeMeshCanvas();
      window.addEventListener('resize', resizeMeshCanvas);
    }

    function clearMesh() {
      meshCtx.clearRect(0, 0, scanStage.clientWidth, scanStage.clientHeight);
    }

    function getCoverProjection() {
      const stageW = scanStage.clientWidth || 480;
      const stageH = scanStage.clientHeight || 480;
      const srcW = video.videoWidth || ANALYSIS_WIDTH;
      const srcH = video.videoHeight || ANALYSIS_HEIGHT;
      const scale = Math.max(stageW / srcW, stageH / srcH);
      const drawW = srcW * scale;
      const drawH = srcH * scale;
      const offsetX = (stageW - drawW) / 2;
      const offsetY = (stageH - drawH) / 2;
      return { drawW, drawH, offsetX, offsetY };
    }

    function projectLandmark(point, projection) {
      return {
        x: (point.x * projection.drawW) + projection.offsetX,
        y: (point.y * projection.drawH) + projection.offsetY,
        z: point.z || 0
      };
    }

    function drawConnectorSet(points, connectors, color, lineWidth) {
      meshCtx.beginPath();
      meshCtx.strokeStyle = color;
      meshCtx.lineWidth = lineWidth;
      for (const [from, to] of connectors) {
        const a = points[from];
        const b = points[to];
        if (!a || !b) continue;
        meshCtx.moveTo(a.x, a.y);
        meshCtx.lineTo(b.x, b.y);
      }
      meshCtx.stroke();
    }

    function drawMeshResults(landmarks) {
      clearMesh();
      if (!landmarks || !landmarks.length) return;
      const projection = getCoverProjection();
      const points = landmarks.map((point) => projectLandmark(point, projection));

      drawConnectorSet(points, FACEMESH_TESSELATION, 'rgba(0, 229, 255, 0.25)', 0.3);
      drawConnectorSet(points, FACEMESH_FACE_OVAL, 'rgba(0, 255, 136, 0.6)', 0.6);
      drawConnectorSet(points, FACEMESH_LEFT_EYE, 'rgba(0, 255, 136, 0.7)', 0.6);
      drawConnectorSet(points, FACEMESH_RIGHT_EYE, 'rgba(0, 255, 136, 0.7)', 0.6);
      drawConnectorSet(points, FACEMESH_LEFT_EYEBROW, 'rgba(0, 229, 255, 0.5)', 0.5);
      drawConnectorSet(points, FACEMESH_RIGHT_EYEBROW, 'rgba(0, 229, 255, 0.5)', 0.5);
      drawConnectorSet(points, FACEMESH_LIPS, 'rgba(0, 229, 255, 0.5)', 0.5);

      meshCtx.fillStyle = 'rgba(0, 255, 136, 0.95)';
      const anchors = [1, 10, 152, 33, 263, 61, 291, 13, 14];
      for (const index of anchors) {
        const point = points[index];
        if (!point) continue;
        meshCtx.beginPath();
        meshCtx.arc(point.x, point.y, 4, 0, Math.PI * 2);
        meshCtx.fill();
      }
    }

    function updateTelemetry(landmarks) {
      intelTime.textContent = `${Math.round(lastMeshMs)} ms`;

      if (!landmarks || !landmarks.length) {
        intelStatus.textContent = 'ESCANEO';
        intelFace.textContent = 'NO DETECTADO';
        intelPoints.textContent = '0';
        intelConfidence.textContent = '0%';
        return;
      }

      intelStatus.textContent = 'ROSTRO DETECTADO';
      intelFace.textContent = 'CARA HUMANA';
      intelPoints.textContent = `${landmarks.length}`;
      intelConfidence.textContent = '98%';
    }

    function handleMeshResults(results) {
      const landmarks = results.multiFaceLandmarks && results.multiFaceLandmarks.length
        ? results.multiFaceLandmarks[0]
        : null;

      latestLandmarks = landmarks;
      drawMeshResults(landmarks);
      updateTelemetry(landmarks);
    }

    faceMesh.onResults(handleMeshResults);

    function captureFrame() {
      const srcW = video.videoWidth || 480;
      const srcH = video.videoHeight || 480;
      const scale = Math.min(1, CAPTURE_MAX_WIDTH / srcW);
      canvas.width = Math.round(srcW * scale);
      canvas.height = Math.round(srcH * scale);
      captureCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', JPEG_QUALITY);
    }

    async function runMeshTick() {
      if (meshRunning || video.readyState < 2) return;
      meshRunning = true;
      const startedAt = performance.now();

      try {
        detectCtx.drawImage(video, 0, 0, ANALYSIS_WIDTH, ANALYSIS_HEIGHT);
        await faceMesh.send({ image: detectCanvas });
        lastMeshMs = performance.now() - startedAt;
      } finally {
        meshRunning = false;
      }
    }

    async function meshLoop() {
      const now = performance.now();
      if (now - lastMeshAt >= MESH_INTERVAL) {
        lastMeshAt = now;
        await runMeshTick();
      }
      requestAnimationFrame(meshLoop);
    }

    async function sendFrame() {
      isBusy = true;
      const frame_b64 = captureFrame();

      try {
        dotEl.className = 'status-dot ok';
        connectionText.textContent = 'Enviando...';
        const res = await fetch(`${BACKEND_URL}/api/v1/identify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ frame_b64 })
        });

        dotEl.className = res.ok ? 'status-dot ok' : 'status-dot fail';
        connectionText.textContent = res.ok ? 'Conectado' : 'Error';

        if (res.ok) handleResponse(await res.json());
      } catch {
        dotEl.className = 'status-dot fail';
        connectionText.textContent = 'Sin conexión';
        intelEvent.textContent = 'BACKEND OFFLINE';
      } finally {
        if (body.className === 'state-idle') isBusy = false;
      }
    }

    async function detectionLoop() {
      const faceFound = Boolean(latestLandmarks && latestLandmarks.length);

      if (body.className === 'state-idle') {
        if (waitingForApproval) {
          intelEvent.textContent = 'ESPERANDO APROBACIÓN';
          countdownEl.textContent = 'ESPERANDO APROBACIÓN';
          messageSubEl.textContent = 'Aguarde respuesta del guardia';
        } else if (faceFound) {
          intelEvent.textContent = 'LISTO';
          countdownEl.textContent = 'LISTO PARA LECTURA';
          messageSubEl.textContent = '';
        } else {
          intelEvent.textContent = 'ESCANEO';
          countdownEl.textContent = 'LISTO PARA LECTURA';
          messageSubEl.textContent = 'Presente su rostro frente a la cámara';
        }
      }

      if (!isBusy && !waitingForApproval) {
        if (faceFound) await sendFrame();
      }
      setTimeout(detectionLoop, DETECT_INTERVAL);
    }

    function getChallengeText(challenge) {
      const texts = {
        'smile': 'Sonría',
        'turn_left': 'Gire a la izquierda',
        'turn_right': 'Gire a la derecha',
        'blink': 'Parpadee'
      };
      return texts[challenge] || 'Siga las instrucciones';
    }

    function getChallengeIcon(challenge) {
      const icons = {
        'smile': '😊',
        'turn_left': '←',
        'turn_right': '→',
        'blink': '👁'
      };
      return icons[challenge] || '👤';
    }

    let challengeFrameIndex = 0;
    let lastChallengeFrameTime = 0;

    function startChallenge() {
      const challenge = CHALLENGES[Math.floor(Math.random() * CHALLENGES.length)];
      currentChallenge = challenge;
      waitingForChallenge = true;
      challengeFrames = [];
      challengeStartTime = performance.now();
      challengeFrameIndex = 0;
      lastChallengeFrameTime = 0;
      
      console.log('>>> CHALLENGE STARTED:', challenge);
      messageEl.textContent = getChallengeText(challenge);
      messageSubEl.textContent = 'Siga las instrucciones...';
      countdownEl.textContent = 'VERIFICANDO';
      intelEvent.textContent = 'DESAFÍO: ' + challenge.toUpperCase();
      body.className = 'state-unknown';
    }

    function updateChallengeUI() {
      const elapsed = performance.now() - challengeStartTime;
      const now = performance.now();
      
      if (elapsed > CHALLENGE_DURATION) {
        console.log('[Debug] Challenge timeout, frames collected:', challengeFrames.length);
        finishChallenge();
        return;
      }

      const remainingSec = Math.ceil((CHALLENGE_DURATION - elapsed) / 1000);
      countdownEl.textContent = `ESPERE ${remainingSec}s (${challengeFrames.length}/${CHALLENGE_FRAMES})`;
      
      const faceFound = Boolean(latestLandmarks && latestLandmarks.length);
      if (faceFound) {
        if (now - lastChallengeFrameTime > 400) {
          challengeFrames.push(captureFrame());
          lastChallengeFrameTime = now;
          challengeFrameIndex++;
          console.log('[Debug] Frame captured:', challengeFrames.length, 'Face found:', faceFound);
          if (challengeFrames.length >= CHALLENGE_FRAMES) {
            finishChallenge();
          }
        }
      } else {
        console.log('[Debug] No face detected during challenge');
      }
    }

    async function finishChallenge() {
      if (challengeFrames.length === 0) {
        waitingForChallenge = false;
        isBusy = false;
        return;
      }

      isBusy = true;
      const primaryFrame = challengeFrames[0];
      
      console.log('[Debug] Sending challenge:', currentChallenge, 'Frames:', challengeFrames.length);
      console.log('[Debug] Primary frame length:', primaryFrame ? primaryFrame.length : 0);
      console.log('[Debug] Challenge frames:', challengeFrames.slice(1).length);
      
      try {
        dotEl.className = 'status-dot ok';
        connectionText.textContent = 'Verificando...';
        const payload = { 
          frame_b64: primaryFrame,
          challenge_frames: challengeFrames.slice(1),
          challenge: currentChallenge
        };
        console.log('[Debug] Payload:', JSON.stringify(payload).slice(0, 200) + '...');
        
        const res = await fetch(`${BACKEND_URL}/api/v1/identify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            frame_b64: primaryFrame,
            challenge_frames: challengeFrames.slice(1),
            challenge: currentChallenge
          })
        });

        dotEl.className = res.ok ? 'status-dot ok' : 'status-dot fail';
        connectionText.textContent = res.ok ? 'Conectado' : 'Error';

        if (res.ok) {
          const data = await res.json();
          if (data.status === 'liveness_failed') {
            showState('error', 'error', 'Verificación fallida', 'Intente de nuevo');
            intelEvent.textContent = 'REINTENTE';
            setTimeout(resetIdle, 3000);
          } else {
            handleResponse(data);
          }
        } else {
          handleResponse({ status: 'error', message: 'Error en verificación' });
        }
      } catch {
        dotEl.className = 'status-dot fail';
        connectionText.textContent = 'Sin conexión';
        intelEvent.textContent = 'BACKEND OFFLINE';
      } finally {
        waitingForChallenge = false;
        challengeFrames = [];
        currentChallenge = null;
        if (body.className === 'state-idle') isBusy = false;
      }
    }

    function handleResponse(data) {
      switch (data.status) {
        case 'no_face':
        case 'debounced':
          isBusy = false;
          intelEvent.textContent = 'ROSTRO NO VÁLIDO';
          return;
        case 'liveness_failed':
          isBusy = false;
          showState('error', 'error', 'Verificación fallida', data.message || 'Intente de nuevo');
          intelEvent.textContent = 'REINTENTE';
          return;
        case 'known':
          waitingForApproval = false;
          if (data.event_type === 'entry') {
            showState('entry', 'check', data.message, 'Acceso de entrada autorizado');
            intelEvent.textContent = 'ENTRADA REGISTRADA';
          } else {
            showState('exit', 'logout', data.message, data.duration ? `Permanencia: ${data.duration}` : 'Salida registrada');
            intelEvent.textContent = 'SALIDA REGISTRADA';
          }
          return;
        case 'pending_approval':
          waitingForApproval = true;
          isBusy = true;
          showState('unknown', 'clock', 'Esperando aprobación...', 'El guardia debe aprobar el acceso');
          intelEvent.textContent = 'ESPERANDO APROBACIÓN';
          // Keep isBusy = true to block new scans
          return;
        case 'pending_registration':
          waitingForApproval = true;
          isBusy = true;
          showState('unknown', 'user-plus', 'Registrando visitante...', 'Complete el registro en el admin');
          intelEvent.textContent = 'ESPERANDO REGISTRO';
          // Keep isBusy = true to block new scans
          return;
        case 'unknown':
          showState('unknown', 'alert', data.message, 'Requiere validación manual');
          intelEvent.textContent = 'DESCONOCIDO';
          return;
        default:
          showState('error', 'error', 'No fue posible validar', 'Verifique el sistema');
          intelEvent.textContent = 'ERROR';
      }
    }

    function getIconSVG(icon) {
      const icons = {
        'check': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
        'logout': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
        'alert': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        'error': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        'user': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>',
        'clock': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>',
        'user-plus': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>'
      };
      return icons[icon] || icons['user'];
    }

    function showState(state, icon, message, duration) {
      isBusy = true;
      clearTimeout(msgTimer);
      body.className = `state-${state}`;
      document.getElementById('message-icon').innerHTML = getIconSVG(icon);
      messageEl.textContent = message;
      messageSubEl.textContent = duration || '';
      msgTimer = setTimeout(resetIdle, MSG_DURATION);
    }

    function resetIdle() {
      body.className = 'state-idle';
      document.getElementById('message-icon').innerHTML = getIconSVG('user');
      messageEl.textContent = 'Presente su rostro frente a la cámara';
      messageSubEl.textContent = '';
      isBusy = false;
      waitingForApproval = false;
    }

    function connectWebSocket() {
      ws = new WebSocket(WS_URL);
      
      ws.onopen = () => {
        dotEl.className = 'status-dot ok';
        connectionText.textContent = 'Conectado';
      };
      
      ws.onclose = () => {
        wsReconnectTimer = setTimeout(connectWebSocket, 3000);
      };
      
      ws.onerror = () => {
        ws.close();
      };
      
      ws.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          
          // Handle approval/registration results via WebSocket
          if (event.type === 'entry' && waitingForApproval) {
            waitingForApproval = false;
            const personName = event.person?.full_name || 'Bienvenido';
            showState('entry', 'check', `Acceso autorizado: ${personName}`, 'Entrada registrada');
            intelEvent.textContent = 'ENTRADA AUTORIZADA';
          } else if (event.type === 'exit' && waitingForApproval) {
            waitingForApproval = false;
            showState('exit', 'logout', 'Salida autorizada', event.duration ? `Permanencia: ${event.duration}` : 'Salida registrada');
            intelEvent.textContent = 'SALIDA AUTORIZADA';
          } else if (event.type === 'unknown' && waitingForApproval) {
            // Access denied
            waitingForApproval = false;
            showState('error', 'error', 'Acceso denegado', 'El guardia no autorizó el acceso');
            intelEvent.textContent = 'ACCESO DENEGADO';
          }
        } catch {}
      };
    }

    async function initFaceMesh() {
      loadingTxt.textContent = 'Cargando modelo facial...';
    }

    async function init() {
      connectWebSocket();
      
      try {
        loadingTxt.textContent = 'Iniciando cámara...';
        await startCamera();
        connectionText.textContent = 'Conectado';
        dotEl.className = 'status-dot ok';
      } catch (err) {
        loadingTxt.textContent = `Error: ${err.message}`;
        showState('error', 'error', 'No se pudo abrir la cámara', 'Permita los permisos y recargue');
        return;
      }

      try {
        await initFaceMesh();
      } catch (err) {
        loadingTxt.textContent = `Error: ${err.message}`;
        showState('error', 'error', 'No se pudo cargar el modelo', 'Verifique su conexión');
        return;
      }

      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 520);
      
      meshLoop();
      detectionLoop();
    }

    init();
  </script>
</body>
